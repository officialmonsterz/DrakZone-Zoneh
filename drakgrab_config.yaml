# DrakGrab 2026 Configuration File
# =================================

# Proxy support (single proxy or list/rotate)
proxies: 
  # http://user:pass@proxy:port
  # or list: ["http://p1:8080", "http://p2:8080"]
  # null = no proxy
  null

# Shodan API key (optional - enhances port/org/OS intel)
shodan_api: "YOUR_SHODAN_API_KEY_HERE"

# Tool paths (auto-detects if in PATH)
nuclei_path: "nuclei"          # ~/go/bin/nuclei recommended
nmap_path: "nmap"              # Kali default

# Performance tuning
max_threads: 50                # Parallel analysis workers
scan_timeout: 3                # Nmap aggressive timing
retry_attempts: 3              # HTTP retry count
rate_delay_min: 1              # Anti-ban delay (seconds)
rate_delay_max: 5              # Random delay range

# 2026 Enhancements (future-proof)
ollama_model: "llama3.1:8b"    # Local AI vuln analysis
playwright: true               # Stealth browser fallback
tor_proxy: "socks5://127.0.0.1:9050"
cloudflare_solve: true         # hCaptcha bypass

# Scoring weights (customize attack surface priority)
scoring:
  high_value_ports: [21, 22, 23, 80, 443, 3389, 2082, 2083, 2086, 2087]
  port_weights:
    21: 15      # FTP
    22: 10      # SSH
    3389: 25    # RDP
  vuln_multipliers:
    critical: 50
    high: 25
    medium: 10
